# Small RNA测序分析流程配置文件
# 项目名称
project_name: "small_rna_analysis_gao_pal"

# 样本信息配置
samples:
  metadata_file: "data/metadata/sample_info.csv"
  group_column: "group"
  sample_column: "sample"
  groups:
    - "GAO"
    - "PAL"

# 数据目录配置
directories:
  raw_fastq: "data/raw_fastq"
  processed: "data/processed"
  references: "references"
  results: "results"
  logs: "logs"

# 参考基因组配置
# 注意：genome_fasta和gtf_annotation可以是压缩文件(.gz)或解压文件
#       genome_index (.fai) 会自动由samtools faidx生成，无需手动创建
reference:
  genome_fasta: "references/hg38.fa"
  genome_fasta_gz: "references/hg38.fa.gz"
  genome_index: "references/hg38.fa.fai"  # 自动生成，无需手动创建
  bowtie2_index: "references/bowtie2_index/hg38"
  gtf_annotation: "references/hg38.knownGene.gtf"
  gtf_annotation_gz: "references/hg38.knownGene.gtf.gz"
  # miRBase参考序列（用于small RNA motif分析）
  mirbase_fasta: "references/hsa.mature.fa"
  mirbase_bowtie2_index: "references/bowtie2_index/hsa_mirbase"

# 质量控制参数
quality_control:
  fastqc:
    threads: 4
  trimmomatic:
    java_memory: "4g"
    threads: 4
    leading: 3
    trailing: 3
    slidingwindow: "4:15"
    minlen: 18
    adapter_file: "config/VAHTS-SmallRNA-V2.fa"
    adapter_type: "vahts_small_rna_v2"

# 序列比对参数
alignment:
  bowtie2:
    threads: 8
    preset: "very-sensitive-local"
    seed_length: 15
    max_mismatches: 1
    k: 10
  samtools:
    threads: 4

# 基因计数参数
counting:
  featureCounts:
    threads: 8
    strandness: 0  # 0=unstranded, 1=stranded, 2=reverse-stranded
    min_overlap: 1
    count_multi_mapping: false
    feature_type: "transcript"  # knownGene GTF使用transcript类型
    attribute: "gene_id"  # knownGene GTF使用gene_id属性
    small_rna_mode: true

# 差异表达分析参数
differential_expression:
  deseq2:
    padj_threshold: 0.05
    log2fc_threshold: 1.0
    shrinkage: true
    control_group: "GAO"
    treatment_group: "PAL"

# motif分析参数（small RNA motif分析专用）
# 流程：fastq -> trim -> map to miRBase -> extract miRNA reads -> MEME motif发现
motif_analysis:
  # miRBase比对参数
  mirbase:
    min_len: 18      # 最小small RNA长度
    max_len: 35      # 最大small RNA长度
    max_mismatches: 1  # 最大错配数
  # MEME motif发现参数（针对small RNA优化）
  meme:
    min_width: 5
    max_width: 8
    max_motifs: 3
    evalue_threshold: 1e-4
    minsites: 10
    maxsites: 100
    searchsize: 100000
    threads: 8
  filtering:
    evalue_threshold: 1e-4
    min_sites: 10
    min_width: 5
    max_width: 8

# Snakemake配置
snakemake:
  cores: 16
  latency_wait: 60
  restart_times: 2
  keep_going: true

# 可视化参数
visualization:
  dpi: 300
  figure_format: "png"
  color_palette: "Set2"

# 执行参数
execution:
  dry_run: false
  quiet: false
  verbose: true
