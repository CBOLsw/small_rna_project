name: small_rna_analysis
channels:
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/bioconda
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main
  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/r
variables:
  R_PROFILE_USER: "${CONDA_PREFIX}/.Rprofile"
  BIOCONDUCTOR_MIRROR: "https://mirrors.tuna.tsinghua.edu.cn/bioconductor"
  R_REPOSITORIES: "https://mirrors.tuna.tsinghua.edu.cn/CRAN/"
dependencies:
  - python=3.9
  - pip
  - freetype
  - fontconfig
  - fastqc=0.12
  - trimmomatic=0.39
  - cutadapt=4.6
  - bowtie2
  - samtools=1.17
  - subread=2.0
  - r-base=4.3
  - r-essentials
  - r-tidyverse
  - r-ggplot2
  - r-pheatmap
  - r-gplots
  - r-reshape2
  - r-rcurl
  - r-devtools
  - meme=5.5
  - snakemake=7.32
  - pip:
    - biopython==1.81
    - pysam==0.21.0
    - pandas==2.1.4
    - numpy==1.26.2
    - matplotlib==3.8.2
    - seaborn==0.13.0
    - jupyter==1.0.0
    - notebook==7.0.6
