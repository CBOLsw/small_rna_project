name: small_rna_analysis
channels:
  - conda-forge
  - bioconda
  - defaults
variables:
  R_PROFILE_USER: "${CONDA_PREFIX}/.Rprofile"
  BIOCONDUCTOR_MIRROR: "https://mirrors.tuna.tsinghua.edu.cn/bioconductor"
  R_REPOSITORIES: "https://mirrors.tuna.tsinghua.edu.cn/CRAN/"
dependencies:
  - python=3.10
  - pip
  - freetype
  - fontconfig
  - fastqc=0.12
  - trimmomatic=0.39
  - cutadapt=4.6
  - bowtie2
  - samtools=1.17
  - subread=2.0
  - mosdepth=0.3
  - r-base=4.3
  - r-ggplot2
  - r-dplyr
  - r-pheatmap
  - r-optparse
  - r-ggrepel
  - r-rcolorbrewer
  - bioconductor-deseq2
  - bioconductor-apeglm
  - meme
  - snakemake>=7.32,<8
  - pyyaml
  - pip:
    - biopython==1.81
    - pysam==0.21.0
    - pandas==2.1.4
    - numpy==1.26.2
    - matplotlib==3.8.2
    - seaborn==0.13.0
    - jupyter==1.0.0
    - notebook==7.0.6
    - tqdm==4.66.1
