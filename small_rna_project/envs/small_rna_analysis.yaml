name: small_rna_analysis
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # 核心Python环境
  - python=3.9
  - pip

  # 数据质量控制和序列处理
  - fastqc=0.12
  - trimmomatic=0.39
  - cutadapt=4.6  # 备选接头去除工具

  # 序列比对和SAM/BAM处理
  - bowtie2=2.5
  - samtools=1.17

  # 基因计数
  - subread=2.0  # 包含featureCounts

  # R环境（用于DESeq2和其他统计分析）
  - r-base=4.3
  - r-essentials
  - r-deseq2
  - r-tidyverse
  - r-ggplot2
  - r-pheatmap
  - r-gplots
  - r-reshape2

  # motif分析 (MEME Suite)
  - meme=5.5

  # Python生物信息学库
  - pip:
    - biopython==1.81
    - pysam==0.21.0
    - pandas==2.1.4
    - numpy==1.26.2
    - matplotlib==3.8.2
    - seaborn==0.13.0
    - jupyter==1.0.0
    - notebook==7.0.6

  # 流程管理
  - snakemake=7.32